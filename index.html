<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة تعارف - لجنة التحكيم</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <!-- أزرار -->
  <div class="no-print mb-4 flex flex-col gap-4 bg-white p-4 rounded-xl shadow-sm border w-full max-w-[700px]">

    <div class="flex gap-3 justify-center border-b pb-4">
      <button onclick="showPage(1)" class="bg-blue-900 text-white px-4 py-2 rounded">الرئيسية</button>
      <button onclick="showPage(2)" class="bg-gray-200 px-4 py-2 rounded">اللجنة</button>
      <button onclick="showPage(3)" class="bg-gray-200 px-4 py-2 rounded">الطلبة</button>
    </div>

    <div class="flex justify-center">
      <button onclick="downloadCard(this)" class="bg-blue-900 text-white px-4 py-2 rounded">
        تحميل كصورة
      </button>
    </div>

  </div>

  <!-- الكارت -->
  <div class="card-container w-[700px] h-[550px] bg-white shadow rounded relative flex flex-col">

    <!-- الشعار -->
    <img src="assets/logo.png" class="absolute top-5 right-5 w-24">

    <!-- ================= الصفحة 1 ================= -->
    <div id="page1" class="flex flex-col items-center justify-center flex-1">

      <h2 class="text-xl text-blue-900">أكاديمية حامل المسك</h2>
      <h1 class="text-3xl text-yellow-600 mt-2">دبلومة التوجيه</h1>

    </div>

    <!-- ================= الصفحة 2 ================= -->
    <div id="page2" style="display:none" class="flex flex-col items-center justify-center flex-1">

      <h1 class="text-2xl text-blue-900">لجنة التحكيم</h1>

    </div>

    <!-- ================= الصفحة 3 ================= -->
    <div id="page3" style="display:none" class="flex flex-col flex-1 p-6">

      <h1 class="text-2xl text-blue-900 text-center mb-4">
        بيان نجاح طالب
      </h1>

      <!-- البحث -->
      <div class="no-print mb-4">
        <input 
          type="number"
          id="searchStudentId"
          oninput="searchStudent()"
          placeholder="رقم الجلوس"
          class="w-full border p-2 text-center"
        >
        <p id="notFoundMsg" class="text-red-500 text-center hidden mt-2">
          رقم الطالب غير موجود
        </p>
      </div>

      <!-- البيانات -->
      <div class="flex flex-col gap-4 flex-1 justify-center">

        <input id="studentName" placeholder="الاسم" class="border-b text-center text-xl">
        <input id="studentGrade" placeholder="التقدير" class="border-b text-center text-xl">
        <input id="studentRank" placeholder="المركز" class="border-b text-center text-xl">

      </div>

      <!-- الأختام -->
      <div class="flex justify-between mt-auto pt-6">
        <img src="assets/stamp-right.png" class="h-16">
        <img src="assets/stamp-center.png" class="h-20">
        <img src="assets/stamp-left.png" class="h-16">
      </div>

    </div>

  </div>

  <!-- الملفات -->
  <script src="data/students.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
